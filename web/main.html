<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria d'Arte Virtuale</title>
    
    <!-- Tailwind CSS (per l'interfaccia utente veloce) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Il tuo foglio di stile personalizzato -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- UI Overlay: Mirino centrale -->
    <div id="crosshair"></div>

    <!-- UI Overlay: Debug Info (Coordinate) 
    <div id="debug-info" class="fixed top-4 left-4 z-50 bg-black bg-opacity-75 text-green-400 p-4 font-mono text-sm rounded pointer-events-none select-none">
        <p>CAM POS: <span id="dbg-cam">0, 0, 0</span></p>
        <p>LOOK AT: <span id="dbg-look">---</span></p>
    </div>-->

    <!-- UI Overlay: Schermata di inizio (Blocker) -->
    <div id="blocker">
        <h1 class="text-4xl font-bold mb-4">I volti dell'ignoto</h1>
        <p class="text-xl mb-8">Clicca per entrare ed esplorare</p>
        <div class="bg-gray-800 p-6 rounded-lg text-left max-w-md border border-gray-600">
            <h3 class="font-bold text-yellow-400 mb-2">Comandi:</h3>
            <ul class="list-disc pl-5 space-y-1">
                <li><span class="font-mono bg-gray-700 px-1 rounded">W, A, S, D</span> o <span class="font-mono bg-gray-700 px-1 rounded">Tasti freccia</span> per muoverti</li>
                <li><span class="font-mono bg-gray-700 px-1 rounded">Mouse</span> per guardare in giro</li>
                <li><span class="font-mono bg-gray-700 px-1 rounded">Click</span> sulle opere per i dettagli</li>
                <li><span class="font-mono bg-gray-700 px-1 rounded">ESC</span> per uscire o chiudere i dettagli</li>
            </ul>
        </div>
    </div>

    <!-- UI Overlay: Modale Dettagli Opera (Nascosto di default) -->
    <div id="info-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-80 backdrop-blur-sm p-4">
        <div class="bg-white rounded-lg shadow-2xl max-w-6xl w-full max-h-[90vh] overflow-hidden flex flex-col md:flex-row fade-in relative">
            
            <!-- Bottone chiusura -->
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-white rounded-full p-2 shadow-lg hover:bg-gray-100 z-10 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Immagine Modale (Più grande) -->
            <div class="w-full md:w-2/3 h-80 md:h-auto bg-gray-100 flex items-center justify-center p-6">
                <img id="modal-img" src="" alt="Opera" class="max-w-full max-h-full object-contain shadow-2xl">
            </div>

            <!-- Testo Modale -->
            <div class="w-full md:w-1/3 p-8 overflow-y-auto modal-content bg-gray-50">
                <span id="modal-year" class="text-sm font-semibold text-blue-600 tracking-wider uppercase">Anno</span>
                <h2 id="modal-title" class="text-3xl font-bold text-gray-900 mt-1 mb-2 font-serif">Titolo Opera</h2>
                <h3 id="modal-artist" class="text-xl text-gray-600 italic mb-6">Artista</h3>
                
                <div class="prose max-w-none text-gray-700">
                    <p id="modal-desc">Descrizione...</p>
                </div>

                <div class="mt-8 pt-6 border-t border-gray-200">
                    <p class="text-xs text-gray-500">Tecnica: <span id="modal-tech">Olio su tela</span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Container 3D (qui verrà disegnata la scena) -->
    <div id="canvas-container"></div>

    <!-- LIBRERIE ESTERNE -->
    <!-- Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- PointerLockControls (per il movimento FPS) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <!-- GLTFLoader (per caricare modelli .glb/.gltf) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- I TUOI SCRIPT LOCALI -->
    <!-- Carica PRIMA i dati, così sono disponibili per lo script principale -->
    <script src="data.js"></script>
    <!-- Carica la logica 3D -->
    <script src="script.js"></script>
</body>
</html>
